<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InstaFox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #080f0f;
      color: #9da39a;
    }

    .header {
      padding: 24px 20px;
      background: linear-gradient(135deg, #ff7f11 0%, #ff1b1c 100%);
      color: white;
      text-align: center;
      border-bottom: 3px solid #ff7f11;
    }

    .header h1 {
      font-size: 26px;
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 13px;
      opacity: 0.95;
      font-weight: 500;
    }

    .content {
      padding: 20px;
    }

    .section {
      margin-bottom: 20px;
    }

    .section h2 {
      font-size: 15px;
      margin-bottom: 12px;
      color: white;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: #111819;
      padding: 18px;
      border-radius: 10px;
      text-align: center;
      border: 2px solid #7e8287;
      transition: all 0.2s;
    }

    .stat-card:hover {
      border-color: #ff7f11;
      transform: translateY(-2px);
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #ff7f11;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 11px;
      color: #9da39a;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .button {
      width: 100%;
      padding: 13px;
      background: #ff7f11;
      color: white;
      border: 2px solid #ff7f11;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }

    .button:hover {
      background: #ff8c2e;
      border-color: #ff8c2e;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 127, 17, 0.3);
    }

    .button.secondary {
      background: transparent;
      color: #9da39a;
      border: 2px solid #7e8287;
    }

    .button.secondary:hover {
      background: #111819;
      color: white;
      border-color: #9da39a;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #7e8287;
    }

    .link {
      color: #ff7f11;
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.2s;
      font-weight: 500;
    }

    .link:hover {
      background: #111819;
      color: #ff8c2e;
      padding-left: 12px;
    }

    .status {
      padding: 12px 16px;
      background: rgba(76, 175, 80, 0.15);
      color: #66bb6a;
      border: 2px solid rgba(76, 175, 80, 0.3);
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .status.inactive {
      background: rgba(255, 127, 17, 0.15);
      color: #ff7f11;
      border-color: rgba(255, 127, 17, 0.3);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦊 InstaFox</h1>
    <p>Enhanced Instagram for Desktop</p>
  </div>

  <div class="content">
    <div class="status" id="status">
      ✓ Extension active on Instagram
    </div>

    <div class="section">
      <h2>Quick Stats</h2>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="total-stories">0</div>
          <div class="stat-label">Stories</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="total-posts">0</div>
          <div class="stat-label">Posts</div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Quick Actions</h2>
      <button class="button" id="view-drafts-btn">View Drafts</button>
      <button class="button" id="view-scheduled-btn">View Scheduled</button>
      <button class="button" id="view-analytics-btn">View Analytics</button>
    </div>

    <div class="links">
      <a href="#" class="link" id="open-instagram">📷 Open Instagram</a>
      <a href="#" class="link" id="settings-link">⚙️ Settings</a>
      <a href="#" class="link" id="help-link">❓ Help & Documentation</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
